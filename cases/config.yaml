case:
  name: ethanol_transport_only_baseline
  description: transport-only baseline case for paper_v1

paths:
  liquid_database_path: ../data/liquid_db.yaml
  gas_mechanism_path: ../mech/gas.yaml
  output_root: out/

mesh:
  a0: 1.0e-4
  r_end: 1.0e-2
  n_liq: 40
  n_gas_near: 80
  far_stretch_ratio: 1.03

species:
  gas_closure_species: N2
  liquid_closure_species: null
  liquid_to_gas_species_map:
    ethanol: C2H5OH

initialization:
  gas_temperature: 1000.0
  gas_pressure: 101325.0
  liquid_temperature: 300.0

  gas_composition:
    O2: 0.21
    N2: 0.79

  liquid_composition:
    ethanol: 1.0

  t_init_T: 1.0e-5

  Y_vap_if0:
    C2H5OH: 0.10

time_stepper:
  t0: 0.0
  t_end: 1.0e-3
  dt_start: 1.0e-6
  dt_min: 1.0e-9
  dt_max: 1.0e-4
  retry_max_per_step: 4
  q_success_for_growth: 3
  growth_factor: 1.2
  shrink_factor: 0.5

outer_stepper:
  outer_max_iter: 8
  eps_dot_a_tol: 1.0e-6
  corrector_relaxation: 1.0

solver_inner_petsc:
  inner_max_iter: 50
  snes_rtol: 1.0e-8
  snes_atol: 1.0e-10
  snes_stol: 1.0e-12
  ksp_rtol: 1.0e-8
  pc_type: ilu
  ksp_type: gmres
  use_fieldsplit: false

recovery:
  rho_min: 1.0e-12
  m_min: 1.0e-20
  species_recovery_eps_abs: 1.0e-14
  Y_sum_tol: 1.0e-10
  Y_hard_tol: 1.0e-6
  h_abs_tol: 1.0e-8
  h_rel_tol: 1.0e-10
  h_check_tol: 1.0e-8
  T_step_tol: 1.0e-8
  T_min_l: 200.0
  T_max_l: 800.0
  T_min_g: 200.0
  T_max_g: 4000.0
  liquid_h_inv_max_iter: 50
  cp_min: 1.0
  gas_h_inv_max_iter: 50
  use_cantera_hpy_first: true

diagnostics:
  verbose_interface_panel: false
  verbose_property_warnings: true
  write_step_diag: true
  write_interface_diag: true
  write_failure_report: true
  output_every_n_steps: 10

output:
  write_spatial_fields: true
  write_spatial_species: false
  write_time_series_scalars: true
  write_time_series_species: false
  snapshot_format: npz

validation:
  enable_mass_balance_check: true
  enable_energy_balance_check: true
  enable_state_bounds_check: true
