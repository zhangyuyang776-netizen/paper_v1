meta:
  file_type: liquid_properties_db
  version: 1
  units:
    molecular_weight: kg/mol
    boiling_temperature: K
    molar_volume: cm^3/mol
    association_factor: "-"
    T_ref: K
    cp_T_range: K
    cp_coeffs: "Shomate-compatible coefficients"
    hvap_ref: J/kg
    Tc: K
    rho_coeffs: "merino_log_poly coefficients"
    k_coeffs: "merino_log_poly coefficients"
    mu_coeffs: "merino_log_poly coefficients"
  reference:
    T_ref: 298.15

global_models:
  liquid_cp_default_model: shomate
  liquid_density_default_model: merino_log_poly
  liquid_conductivity_default_model: merino_log_poly
  liquid_viscosity_default_model: merino_log_poly

  # 这一组要和你当前补齐后的 liquid.py / mix_rules.py 一致
  liquid_diffusion_model: wilke_chang
  liquid_mixture_density_model: merino_x_sqrt_rho
  liquid_mixture_conductivity_model: filippov
  liquid_mixture_viscosity_model: grunberg_nissan

  # 可选: ideal / UNIFAC
  activity_model_default: ideal

# 若 activity_model_default 或某个 species.activity_model 使用 UNIFAC，
# 顶层必须提供 unifac 数据
unifac:
  enabled: true
  groups:
    CH3:
      R: 0.9011
      Q: 0.848
    CH2:
      R: 0.6744
      Q: 0.54
    OH:
      R: 1.0
      Q: 1.2
    H2O:
      R: 0.92
      Q: 1.4
  interactions:
    CH3:
      CH3: 0.0
      CH2: 0.0
      OH: 300.0
      H2O: 500.0
    CH2:
      CH3: 0.0
      CH2: 0.0
      OH: 250.0
      H2O: 450.0
    OH:
      CH3: -200.0
      CH2: -150.0
      OH: 0.0
      H2O: -50.0
    H2O:
      CH3: -300.0
      CH2: -250.0
      OH: 100.0
      H2O: 0.0

